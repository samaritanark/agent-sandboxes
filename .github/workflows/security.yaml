---
# yaml-language-server:$schema=https://json.schemastore.org/github-workflow.json
#
# Trivy security scans.
#
# Runs on every push to master, every PR, weekly, and on demand. Two scans:
#
#   - fs:     scans the repo tree for known CVEs in tracked lockfiles/manifests
#             and for accidentally committed secrets.
#   - config: scans Dockerfiles and Kubernetes manifests for misconfigurations
#             (containers running as root, missing securityContext, etc.).
#
# Findings print to the job log (table format). This is report-only — the job
# does not fail on findings. To enforce, add `exit-code: 1` to the steps below
# (keep severity + ignore-unfixed so it only trips on actionable issues).
#
# NOTE — Security tab / code scanning: this repo is PRIVATE, and GitHub code
# scanning (SARIF upload) requires GitHub Advanced Security on private repos.
# So findings go to the job log, not the Security tab. WHEN THIS REPO GOES
# PUBLIC (code scanning is free for public repos), switch to the richer view:
#   1. add to permissions:  security-events: write  and  actions: read
#   2. on each Trivy step, replace `format: table` with
#      `format: sarif` + `output: trivy-<fs|config>.sarif`
#   3. add an `if: always()` step per file using
#      github/codeql-action/upload-sarif@v4 to upload it.
#
# Not covered: image-content scans of the built agent containers — needs
# image-build infrastructure in CI, which the repo doesn't have yet.

on:  # yamllint disable-line rule:truthy
  push:
    branches: [master]
  pull_request:
  schedule:
    - cron: '0 7 * * 1'  # Mondays 07:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trivy:
    name: Trivy scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Trivy config scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
