---
# yaml-language-server:$schema=https://json.schemastore.org/github-workflow.json
#
# Build, tag, and publish a GitHub Release on every merge to master.
#
# GitHub is the single source of truth for versioning. This workflow
# computes the next version from existing tags plus a marker in the merged
# PR's title, builds the source tarball, then creates the tag and Release
# together via `gh release create`.
#
# Versioning:
#   - Patch bump by default (vX.Y.Z -> vX.Y.(Z+1)).
#   - Override via a marker in the merged PR's title:
#       [bump:minor]  -> vX.(Y+1).0
#       [bump:major]  -> v(X+1).0.0
#   - With no tags yet, the first release is v0.0.1 — or v1.0.0 if the
#     merged PR's title contains [bump:major].
#
# Artifact: a source tarball (agent-sandboxes-vX.Y.Z.tar.gz). `task release`
# resolves the version once (here, with full git history) and embeds it in a
# .version file inside the tarball; the packaged bin/sandbox only reads that
# file at runtime, so `sandbox version` reports the release tag without ever
# recomputing from git.

on:  # yamllint disable-line rule:truthy
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      bump:
        type: choice
        options: [patch, minor, major]
        default: patch

# Serialize releases so two quick merges can't race on version computation
# (both reading the same "latest tag" and computing the same next version).
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release
    # Gitea now only mirrors GitHub — GitHub owns versioning and releases.
    # But this file lives at .github/workflows/, which Gitea Actions also
    # reads by default, so if Gitea Actions is enabled a mirror push to
    # master would run this job there too and fail at `gh release create`.
    # On Gitea, github.server_url is the Gitea server URL, so this guard is
    # false and the job is skipped — releases only ever happen on github.com.
    if: github.server_url == 'https://github.com'
    runs-on: ubuntu-latest
    permissions:
      contents: write        # create tags and releases
      pull-requests: read     # read the merged PR title for the bump marker
    steps:
      - name: Checkout (full history + tags for version computation)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Taskfile
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute next version from tags + PR title marker
        id: ver
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          # Look up the PR that produced this merge commit. Squash and
          # merge-commit strategies both yield exactly one PR per master
          # commit. If the API returns nothing (e.g. a direct push to
          # master), fall back to a patch bump silently.
          pr_title=$(gh api "repos/${REPO}/commits/${SHA}/pulls" \
            --jq '.[0].title // ""' 2>/dev/null || echo "")
          echo "PR title: ${pr_title}"

          latest=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [[ -z "${latest}" ]]; then
            latest="v0.0.0"
          fi
          echo "Latest tag: ${latest}"

          ver="${latest#v}"
          IFS=. read -r major minor patch <<< "${ver}"

          if [[ "${pr_title}" == *"[bump:major]"* ]]; then
            major=$((major + 1)); minor=0; patch=0
          elif [[ "${pr_title}" == *"[bump:minor]"* ]]; then
            minor=$((minor + 1)); patch=0
          else
            patch=$((patch + 1))
          fi

          next="v${major}.${minor}.${patch}"
          echo "Next version: ${next}"
          echo "version=${next}" >> "${GITHUB_OUTPUT}"

      - name: Build release artifact
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: task release VERSION="${VERSION}"

      - name: Create tag and publish GitHub Release with assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          # Short provenance intro; --generate-notes appends the changelog
          # (merged PRs since the previous release, contributors, and a
          # "Full Changelog" compare link) beneath it.
          body=$(printf 'Automated release built from %s.\n' "${SHA}")

          # Collect asset paths into an array so paths with spaces are safe.
          assets=()
          for asset in dist/agent-sandboxes-*; do
            [[ -f "${asset}" ]] && assets+=("${asset}")
          done

          # `gh release create` creates the tag at --target if it does not
          # already exist, then publishes the release — tag and release in
          # one atomic step, pointed at the exact commit that was built.
          # --generate-notes builds the changelog from PRs merged since the
          # previous release (auto-detected, so the very first release just
          # summarizes from the beginning). Grouping can be tuned later by
          # adding .github/release.yml.
          gh release create "${VERSION}" \
            --target "${SHA}" \
            --title "${VERSION}" \
            --notes "${body}" \
            --generate-notes \
            "${assets[@]}"
