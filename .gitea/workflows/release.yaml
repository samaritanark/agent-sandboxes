---
# yaml-language-server:$schema=https://json.schemastore.org/github-workflow.json
#
# Build, tag, and publish a Gitea release on every merge to master.
#
# Versioning:
#   - Patch bump by default (vX.Y.Z -> vX.Y.(Z+1)).
#   - Override via a marker in the merged PR's title:
#       [bump:minor]  -> vX.(Y+1).0
#       [bump:major]  -> v(X+1).0.0
#   - With no tags yet, the first release is v0.0.1 — or v1.0.0 if the
#     merged PR's title contains [bump:major].
#
# Artifact: a source tarball (agent-sandboxes-vX.Y.Z.tar.gz) attached to
# the release. `task release` stamps the version into the packaged
# bin/sandbox, so `sandbox version` reports the release tag.

on:  # yamllint disable-line rule:truthy
  push:
    branches:
      - master

jobs:
  release:
    # Careful: Gitea Branch protection rules may key off this name.
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout (full history + tags for version computation)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Taskfile
        uses: actions/setup-task@v2
        with:
          version: 3.x

      - name: Compute next version from tags + PR title marker
        id: ver
        env:
          GITEA_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITEA_SERVER_URL: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          # Look up the PR that produced this merge commit. Squash and
          # merge-commit strategies both yield exactly one PR per master
          # commit. If the API returns nothing (e.g. a direct push to
          # master), fall back to a patch bump silently.
          pr_title=$(curl -sf \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -H "Accept: application/json" \
            "${GITEA_SERVER_URL}/api/v1/repos/${REPO}/commits/${SHA}/pull" \
            | jq -r '.title // ""' || echo "")
          echo "PR title: ${pr_title}"

          latest=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [[ -z "${latest}" ]]; then
            latest="v0.0.0"
          fi
          echo "Latest tag: ${latest}"

          ver="${latest#v}"
          IFS=. read -r major minor patch <<< "${ver}"

          if [[ "${pr_title}" == *"[bump:major]"* ]]; then
            major=$((major + 1)); minor=0; patch=0
          elif [[ "${pr_title}" == *"[bump:minor]"* ]]; then
            minor=$((minor + 1)); patch=0
          else
            patch=$((patch + 1))
          fi

          next="v${major}.${minor}.${patch}"
          echo "Next version: ${next}"
          echo "version=${next}" >> "${GITHUB_OUTPUT}"

      - name: Build release artifact
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: task release VERSION="${VERSION}"

      - name: Create and push tag
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "agent-sandbox-release-bot"
          git config user.email "agent-sandbox-release-bot@runlevel6.us"
          git tag -a "${VERSION}" -m "Release ${VERSION}"
          git push origin "${VERSION}"

      # ---------------------------------------------------------------------
      # GitHub mirror push — DISABLED until the public GitHub repo is set up.
      # Uncomment when:
      #   1. The public GitHub repo exists at GITHUB_MIRROR_REPO (vars).
      #   2. A fine-grained GitHub PAT with contents:write on that repo is
      #      stored in this Gitea repo's secrets as GITHUB_MIRROR_TOKEN.
      # After enabling, every Gitea release will also push master + the new
      # tag to GitHub, where .github/workflows/release.yaml publishes the
      # matching GitHub Release. Gitea remains the single source of truth
      # for versioning; no version computation happens on GitHub.
      # ---------------------------------------------------------------------
      # - name: Mirror master + tag to GitHub
      #   env:
      #     VERSION: ${{ steps.ver.outputs.version }}
      #     GITHUB_MIRROR_TOKEN: ${{ secrets.GITHUB_MIRROR_TOKEN }}
      #     GITHUB_MIRROR_REPO: ${{ vars.GITHUB_MIRROR_REPO }}
      #   run: |
      #     set -euo pipefail
      #     if [[ -z "${GITHUB_MIRROR_TOKEN:-}" || -z "${GITHUB_MIRROR_REPO:-}" ]]; then
      #       echo "GITHUB_MIRROR_TOKEN / GITHUB_MIRROR_REPO not set — skipping mirror push."
      #       echo "  Configure them to push releases out to the public GitHub repo."
      #       exit 0
      #     fi
      #     remote_url="https://x-access-token:${GITHUB_MIRROR_TOKEN}@github.com/${GITHUB_MIRROR_REPO}.git"
      #     git remote add github "${remote_url}" 2>/dev/null \
      #       || git remote set-url github "${remote_url}"
      #     # --force-with-lease keeps mirror divergence detectable rather
      #     # than silently overwriting public history if someone pushed there.
      #     git push --force-with-lease github "HEAD:refs/heads/master"
      #     git push github "${VERSION}"
      #     echo "Mirror push complete: ${GITHUB_MIRROR_REPO} now has ${VERSION}."

      - name: Publish Gitea release with assets
        env:
          GITEA_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITEA_SERVER_URL: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          VERSION: ${{ steps.ver.outputs.version }}
          SHA: ${{ github.sha }}
        run: |-
          set -euo pipefail

          body=$(printf 'Automated release built from %s.\n' "${SHA}")
          payload=$(jq -n \
            --arg tag "${VERSION}" \
            --arg name "${VERSION}" \
            --arg body "${body}" \
            '{tag_name: $tag, name: $name, body: $body, draft: false, prerelease: false}')

          rel_id=$(curl -sf -X POST \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -H "Content-Type: application/json" \
            "${GITEA_SERVER_URL}/api/v1/repos/${REPO}/releases" \
            -d "${payload}" | jq -r '.id')
          echo "Release id: ${rel_id}"

          for asset in dist/agent-sandboxes-*; do
            [[ -f "${asset}" ]] || continue
            name=$(basename "${asset}")
            echo ">> Uploading ${name}"
            curl -sf -X POST \
              -H "Authorization: token ${GITEA_TOKEN}" \
              -F "attachment=@${asset}" \
              "${GITEA_SERVER_URL}/api/v1/repos/${REPO}/releases/${rel_id}/assets?name=${name}"
          done
