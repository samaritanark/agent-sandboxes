# config.yaml — optional overlay-level defaults.
#
# An overlay may ship this file to set team-wide defaults that the CLI reads at
# run time. Like everything else in an overlay it is additive on the safety
# side: it can ratchet a posture UP but never relax an org-level control.
#
# vetting: the repo-vetting posture (off | advisory | required). An overlay may
# only ratchet this UP relative to the operator's ~/.sandbox/config.yaml
# (advisory → required), never down. Shipping `required` here makes signed-tag
# vetting mandatory for everyone who uses this overlay: `sandbox run` refuses a
# Tier 2/3 launch unless every --repo carries a verified agent-vetted/<sha> tag
# reachable from HEAD. See docs/how-to/vetting.md.
#
# Left at `advisory` here, which matches the org default (a no-op that documents
# intent). Change to `required` to enforce, or delete this file to say nothing.
vetting: advisory

# min_sandbox_version: the minimum agent-sandboxes CLI version this overlay
# needs. An older CLI does not fail on a newer overlay — it silently ignores
# keys it does not know — so when your overlay starts relying on a newer
# feature (a new config key here, a new profile field), declare the version
# that introduced it. 'sandbox link', 'sandbox link sync', and 'sandbox run'
# all refuse while the installed CLI is older; 'sandbox upgrade' is the fix.
# Absent means any version is accepted. A leading 'v' is fine (v2.12.0 and
# 2.12.0 compare equal), and short forms pad with zeros (2.12 == 2.12.0).
#
# min_sandbox_version: 2.12.0

# vetting_max_commits_behind: cap how far behind HEAD a verified attestation may
# be and still clear a repo under `required`. The attestation need not sit at
# HEAD; the intervening commits are ACCEPTED on the assumption they reached the
# branch through code review -- the gate does NOT verify that, it only checks they
# are ancestors of the local HEAD (see docs/how-to/vetting.md) -- so a developer
# who is not an approved signer can launch on a repo their team vetted earlier.
# Within this cap, drift is accepted with no per-session prompt (and logged); over
# it, the launch refuses. Read together with the operator's own value, the
# SMALLEST wins (an overlay can only tighten it). 0 means "must be exactly at
# HEAD" (re-attest every commit); omit for no cap, where each session accepts the
# drift interactively (or with --i-accept-vetting-drift).
#
# This is a STALENESS BUDGET, not a bound on what the drift can contain: one
# commit can change the tree arbitrarily and one commit is under any nonzero cap,
# so the number governs how fresh you keep attestations, not what an unreviewed
# commit (including one an agent authored) could introduce. A merge inflates the
# count by one (an 8-commit branch merges as behind 9), so leave headroom. If you
# want this cap enforced for everyone on the overlay, set it here: forcing
# `vetting: required` alone leaves the cap to each operator's own config. See
# docs/how-to/vetting.md.
#
# vetting_max_commits_behind: 20

# vetting_exceptions_require_head: an OPTIONAL extra-strict posture for a repo's
# committed secret exceptions (the root .betterleaksignore). You usually do NOT
# need this: the gate already reads the honored exception list from the ATTESTED
# commit, not HEAD, so every honored exception is one a signer acknowledged at
# attest time, no matter how far HEAD has drifted — an entry added on a later,
# unsigned commit (by a contributor, or by the agent writing the workspace) is
# simply not honored until a signer re-attests. Setting this true tightens that
# further: honor exceptions ONLY while the verified attestation sits exactly at
# HEAD (behind: 0), for teams that want every honored exception to ride a
# *current* attestation rather than an older but still-valid acknowledgment.
# Under any drift the list is then ignored and those findings block the launch
# until you re-attest HEAD. Tightening-only: `true` wins if EITHER this overlay
# or the operator sets it, so it can ratchet up and never down, the same
# safety-additive rule the posture and the cap follow. See docs/how-to/vetting.md.
#
# vetting_exceptions_require_head: true

# vetting_trust_root: the team's reviewer list — WHOSE signatures count — shipped
# WITH the overlay. A relative path resolves against the overlay root, so the
# value below names a plain `allowed_signers` file at the top of this overlay;
# `sandbox link` then distributes the list and `link sync` (deliberate, shows a
# diff) is the only thing that updates it. This is a UNION with the operator's
# own root (~/.sandbox/vetting/allowed_signers, or vetting_trust_root: in their
# ~/.sandbox/config.yaml): a signature verifying against either file counts, so
# the overlay enrolls the team and a local file can add signers. Both inputs are
# operator-side — nothing a WORKSPACE author commits can touch either one, which
# is the boundary that matters (PRINCIPLES.md, "Repo vetting"). Regenerate the
# file from your forge's /<username>.keys endpoints with this template's
# gen-allowed-signers.sh, review the diff, and commit.
#
# vetting_trust_root: allowed_signers

# trusted_inference_endpoints: the model endpoints trusted to receive
# secret-bearing prompts. This is a GRANT, not a relaxation: its only effect is
# to downgrade the workspace secret gate from a hard refusal to a single
# interactive confirmation when a session's inference endpoint is on this list.
# Everything the agent reads flows to its model endpoint, so an internal
# endpoint keeps that data inside your trust boundary while an external one
# exports it — hence secrets are tolerable to an internal model but not an
# external one.
#
# The gate still SCANS and still SURFACES every finding; a trusted endpoint only
# changes the verdict from "refuse" to "ask". With no interactive terminal
# (CI/headless) the gate fails closed and refuses — use
# --i-accept-unmasked-secrets to consent non-interactively. A trusted endpoint
# closes only the model-exfil channel; the agent can still act on a secret or
# leak it via shell egress, which is why a human confirms rather than the
# launch passing silently.
#
# This list is an operator-side input: it is read only from the active overlay's
# config.yaml (selected via SANDBOX_OVERLAY or your ~/.sandbox/config.yaml), never
# from a repo-local <repo>/.sandbox/config.yaml. That is the boundary it enforces
# — the repo and the in-sandbox agent (the party the secret gate contains) cannot
# add an endpoint or point the agent at one. It does NOT restrict the launching
# operator, who selects the overlay and sets OPENCODE_BASE_URL; that operator
# already controls the gate outright (--i-accept-unmasked-secrets, an overlay
# .betterleaksignore baseline), so for them the list only records intent. Note it
# is unsigned operator config, a weaker guarantee than the signature-anchored
# repo exceptions (the vetted .betterleaksignore). Match is on the exact bare host — no wildcards (a loose
# match on the destination the whole prompt flows to is exactly where a subdomain
# takeover or DNS rebind would masquerade), no port (a listed host is trusted on
# any port). Today only the opencode agent has a caller-chosen endpoint
# (OPENCODE_BASE_URL); the others always use their vendor API and are never on
# this list. Absent/empty ⇒ no endpoint is trusted (feature off).
#
# trusted_inference_endpoints:
#   - vllm.internal.example.org
#   - llm.corp.example.org
