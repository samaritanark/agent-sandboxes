# manifests/serviceaccount.yaml
# ServiceAccount for sandbox agent pods. Has NO RBAC bindings — pods
# cannot query the API server (PRINCIPLES.md, no privileged access).
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sandbox-agent
  namespace: sandbox
  labels:
    app.kubernetes.io/name: sandbox-agent
    app.kubernetes.io/component: sandbox

# Explicitly disable token auto-mount at the SA level.
# Individual pods ALSO set automountServiceAccountToken: false.
automountServiceAccountToken: false
