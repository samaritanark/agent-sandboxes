# manifests/runtimeclass.yaml
# gVisor RuntimeClass for Kubernetes
---
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: gvisor
  labels:
    app.kubernetes.io/name: gvisor
    app.kubernetes.io/component: sandbox
# The handler name must match the runtime registered in containerd config
# See config/containerd-config.toml.tmpl — runtime name "runsc"
handler: runsc
